name: Twice-Daily Automated Blog Generation

on:
  schedule:
    # 9:00 AM IST (3:30 AM UTC), 4:00 PM IST (10:30 AM UTC) & 9:00 PM IST (3:30 PM UTC)
    - cron: '30 3,10,15 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Daily Blog
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node scripts/generate-blog.js

      - name: Generate Sitemap
        run: node scripts/generate-sitemap.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-generate daily blog post - $(date +'%Y-%m-%d')"
            git push
          fi
