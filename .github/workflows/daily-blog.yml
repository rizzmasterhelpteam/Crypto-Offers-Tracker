name: Generate Blog Draft

on:
  workflow_dispatch:

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Blog Draft
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node scripts/generate-blog.js

      - name: Commit Draft
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add drafts/
          if git diff --staged --quiet; then
            echo "No draft generated"
          else
            git commit -m "Draft: $(date +'%Y-%m-%d') - awaiting review"
            git push
          fi
