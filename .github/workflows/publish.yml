name: Publish Selected Draft

on:
  workflow_dispatch:
    inputs:
      draft_file:
        description: Draft file to publish
        required: true
        type: choice
        options:
          # AUTO-GENERATED DRAFT OPTIONS START
          - 'starknet-cairovm-performance-optimization-techniques.html'
          - 'starknet-parallel-transaction-processing-efficiency.html'
          - 'arbitrum-stylus-smart-contract-performance-optimization-techniques.html'
          # AUTO-GENERATED DRAFT OPTIONS END

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Publish Selected Draft
        env:
          DRAFT_FILE: ${{ inputs.draft_file }}
        run: node scripts/publish-selected-draft.js

      - name: Generate Sitemap
        run: node scripts/generate-sitemap.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          if git diff --staged --quiet; then
            echo "Nothing new to publish."
          else
            git commit -m "Publish: ${{ inputs.draft_file }} - $(date +'%Y-%m-%d')"
            git push
          fi
