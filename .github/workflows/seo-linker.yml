name: 4-Hour SEO Auto-Linker Sweep
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
jobs:
  seo-link:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run SEO Auto-Linker
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node scripts/autolink.js
      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git diff --staged --quiet || (git commit -m "Auto-SEO Linker sweep" && git push)
