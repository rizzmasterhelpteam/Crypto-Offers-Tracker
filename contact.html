<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Crypto Offers Tracker 2026</title>
    <meta name="description" content="Contact Crypto Offers Tracker">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e1a;
            color: #d1d5db;
            line-height: 1.6;
            padding: 40px 20px;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        h1,
        h2 {
            color: #fff;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #60a5fa 0%, #a855f7 50%, #10b981 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        a {
            color: #60a5fa;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 40px;
            font-weight: 600;
            text-align: left;
            width: 100%;
        }

        .contact-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            margin-top: 40px;
        }

        .ad-container {
            margin: 25px auto;
            padding: 12px;
            background: rgba(255, 255, 255, 0.015);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            text-align: center;
            min-height: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .ad-label {
            font-size: 0.65rem;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            opacity: 0.6;
        }
    </style>
</head>

<body>
    <div style="text-align: left;"><a href="/" class="back-link">← Back to Tracker</a></div>

    <!-- Top Banner Ad -->
    <div class="ad-container">
        <div class="ad-label">Advertisement</div>
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXXXX" data-ad-slot="1111111111"
            data-ad-format="auto" data-full-width-responsive="true"></ins>
    </div>
    <h1>Contact Us</h1>
    <p>Have questions, feedback, or a business inquiry?</p>

    <div class="contact-box">
        <h2>Get in Touch</h2>
        <p>Email us at: <strong>contact@cryptoofferstracker.com</strong></p>
        <p style="margin-top: 20px; font-size: 0.9rem; color: #9ca3af;">We strive to respond to all inquiries within 48
            hours.</p>
    </div>
</body>

</html>
