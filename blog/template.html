<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} | Crypto Digest</title>
    <meta name="description" content="Expert crypto analysis on {{TOPICS}}. Published on {{DATE}}.">
    <link rel="stylesheet" href="style.css">
    <script>
        window.onscroll = function () {
            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            let scrolled = (winScroll / height) * 100;
            document.getElementById("myBar").style.width = scrolled + "%";
        };
    </script>
</head>

<body>
    <div class="progress-container">
        <div class="progress-bar" id="myBar"></div>
    </div>
    <header>
        <div class="container header-inner">
            <a href="/" class="logo">
                <img src="../assets/logo.png" alt="Crypto Digest Logo">
                <span>Crypto Digest</span>
            </a>
            <nav class="nav-links">
                <a href="/">Home</a>
                <a href="/blog/" style="color: var(--accent-secondary);">Digest</a>
                <a href="/about.html">Architecture</a>
                <a href="/contact.html">Contact</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="post-detail-container">
            <article class="post-detail">
                <header class="post-header">
                    <span class="hero-tag">Market Deep Dive</span>
                    <h1>{{TITLE}}</h1>
                    <div class="post-meta">
                        <span>🗓️ {{DATE}}</span>
                        <span>🔥 Trending: {{TOPICS}}</span>
                    </div>
                </header>

                <div class="content-body">
                    {{CONTENT}}
                </div>
            </article>

            <div style="margin-top: 80px; text-align: center;">
                <a href="/blog/" class="read-more" style="justify-content: center; font-size: 1.2rem;">Back to all
                    Digests</a>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-logo">
                <img src="../assets/logo.png" alt="Logo">
                <span>Crypto Digest</span>
            </div>
            <p>Providing the most intelligent, AI-driven crypto analysis on the market.</p>
            <p>&copy; 2026 Crypto Offers Tracker. All Rights Reserved.</p>
        </div>
    </footer>
</body>

</html>
