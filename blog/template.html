<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} - Crypto Offers Tracker Digest</title>
    <meta name="description" content="Daily crypto market analysis and trending token insights for {{DATE}}.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #60a5fa;
            --text-main: #f8fafc;
            --text-dim: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            padding: 40px 20px;
            background-image:
                radial-gradient(at 0% 0%, rgba(96, 165, 250, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .back-link {
            display: inline-block;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 30px;
            transition: transform 0.2s;
        }

        .back-link:hover {
            transform: translateX(-5px);
        }

        .blog-post {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .blog-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 15px;
            line-height: 1.2;
            background: linear-gradient(135deg, #60a5fa 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .blog-meta {
            display: flex;
            gap: 20px;
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .blog-content {
            font-size: 1.1rem;
        }

        .blog-content p {
            margin-bottom: 20px;
        }

        .blog-content h2,
        .blog-content h3 {
            margin: 30px 0 15px;
            color: var(--accent);
        }

        .footer {
            margin-top: 50px;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="/blog/" class="back-link">← Back to Blog</a>

        <article class="blog-post">
            <h1 class="blog-title">{{TITLE}}</h1>
            <div class="blog-meta">
                <span>📅 {{DATE}}</span>
                <span>🔥 Trending: {{TOPICS}}</span>
            </div>
            <div class="blog-content">
                {{CONTENT}}
            </div>
        </article>

        <div class="footer">
            <p>&copy; 2026 Crypto Offers Tracker. All Rights Reserved.</p>
            <p><a href="/" style="color: var(--accent); text-decoration: none;">Go to Main Tracker</a></p>
        </div>
    </div>
</body>

</html>
